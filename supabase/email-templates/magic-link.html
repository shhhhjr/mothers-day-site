<h2>Sign up for family memories</h2>

<p>
  <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=email&next=/profiles">
    Tap here to finish signing up
  </a>
</p>

<p>
  Or, if the link won't open on your device, paste this 6-digit code into the
  "Email link" tab on the sign-in page:
</p>

<p style="font-size: 24px; letter-spacing: 4px;"><strong>{{ .Token }}</strong></p>

<p style="color: #666; font-size: 12px;">
  If you didn't request this, you can ignore this email.
</p>
