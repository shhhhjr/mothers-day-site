<!--
  Paste EVERYTHING below this comment block (the comment itself is fine to leave in).
  Destination: Supabase Dashboard → Authentication → Email Templates → Invite User → Message Body.

  This template only fires if you manually invite people via Supabase
  Dashboard → Authentication → Users → Invite user. The recommended flow
  for the family site is to just share the URL and have people use the
  "Sign up" form themselves, in which case you don't need to set this up.

  Required Supabase config for this template's URL to work:
    Authentication → URL Configuration → Site URL  MUST start with `https://`
-->
<h2>You're invited to family memories</h2>

<p>
  <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=invite&next=/profiles">
    Tap here to accept and create your account
  </a>
</p>

<p>
  Or paste this 6-digit code into the "Email link" tab on the sign-in page:
</p>

<p style="font-size: 24px; letter-spacing: 4px;"><strong>{{ .Token }}</strong></p>
